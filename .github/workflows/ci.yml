name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

env:
  GO_VERSION: "1.26.4"
  DOTNET_VERSION: "10.0.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  lint:
    name: Lint (gofmt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Check formatting
        run: make GO=go fmt-check

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run go vet
        run: make GO=go vet

  test:
    name: Test (race + examples)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential make

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show tool versions
        run: |
          go version
          dotnet --version
          gcc --version | head -n 1
          make --version | head -n 1

      - name: Run race tests
        run: make GO=go test-race

      - name: Run generated example tests
        run: make GO=go examples-test

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run govulncheck
        run: make GO=go vulncheck

  build:
    name: Build Dist And Docker Smoke
    runs-on: ubuntu-latest
    needs: [lint, vet, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Build release artifacts
        env:
          VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}
          COMMIT: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          make GO=go VERSION="$VERSION" COMMIT="$COMMIT" DATE="$DATE" BRANCH="$BRANCH" dist

      # GitHub CI builds a local image only to smoke-test the Dockerfile. This
      # workflow intentionally does not log in to a registry or push images.
      - name: Build local container image
        env:
          VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}
          COMMIT: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          docker build \
            --build-arg VERSION="$VERSION" \
            --build-arg COMMIT="$COMMIT" \
            --build-arg BUILD_DATE="$DATE" \
            --build-arg BRANCH="$BRANCH" \
            --build-arg GIT_SHA="$COMMIT" \
            --build-arg GIT_BRANCH="$BRANCH" \
            --build-arg REPO_URL="$REPO_URL" \
            --build-arg REPO_TYPE="git" \
            --build-arg CI="true" \
            -t lang-forge:ci \
            .

      - name: Smoke test container
        run: |
          docker run --rm lang-forge:ci version
          docker run --rm -v "$PWD:/workspace:ro" -w /workspace lang-forge:ci validate --spec examples/go/calc/calc.lf

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lang-forge-linux-amd64
            dist/lang-forge-linux-arm64
            dist/lang-forge-darwin-arm64
            dist/lang-forge-darwin-amd64
            dist/lang-forge-windows-amd64.exe
            dist/SHA256SUMS
          body: |
            LangForge CLI release artifacts are attached with SHA256 checksums.
          append_body: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
